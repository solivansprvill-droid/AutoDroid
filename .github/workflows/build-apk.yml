name: Build AutoDroid APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Rename APK to AutoDroid
      run: |
        APK_DIR="app/build/outputs/apk/debug"
        DATE=$(date +%Y%m%d_%H%M%S)
        NEW_NAME="AutoDroid_v0.0.2_${DATE}.apk"
        # 找到构建出来的 apk 并重命名
        find "$APK_DIR" -name "*.apk" | head -1 | xargs -I{} mv {} "$APK_DIR/$NEW_NAME"
        echo "Renamed APK to: $NEW_NAME"
        ls -la "$APK_DIR/"
      
    - name: Upload AutoDroid APK
      uses: actions/upload-artifact@v4
      with:
        name: AutoDroid-debug
        path: app/build/outputs/apk/debug/AutoDroid_*.apk
